<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* Dark-only. State carried by a crisp accent (glowing left bar + dots +
     cluster chip), not a full-card tint (muddy on near-black). slate ->
     amber -> green as noticed -> recurring -> adopted; override gets a
     reserved fourth hue (violet). Radius is near-zero by request. */
  :root {
    --page: #0b0b0e;
    --card: #17171c;
    --card-hover: #1d1d23;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --radius: 2px;

    --noticed: #8b95a7;
    --recurring:  #f4b740;
    --adopted:   #3ddc84;
    --override: #a78bfa;
    --rejected: #b06a7a;   /* muted rose — "set aside", distinct from the 3 states + override */

    --font-sans: 'Ubuntu', system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-hand: 'Caveat', cursive;
  }
  * { box-sizing: border-box; }
  /* faint polka-dot field → scratchpad feel; kept very low-contrast so it
     never competes with the cards. */
  body {
    margin: 0; font-family: var(--font-sans); color: var(--text-primary);
    background:
      radial-gradient(900px 500px at 18% -8%, rgba(97,110,150,0.12), transparent 60%),
      radial-gradient(rgba(255,255,255,0.05) 1.2px, transparent 1.4px),
      var(--page);
    background-size: 100% 100%, 22px 22px, 100% 100%;
    background-attachment: fixed; min-height: 100vh;
  }
  /* one centered shell so header / bar / profile / board all share the same
     gutters and don't stretch edge-to-edge on wide monitors. */
  .shell { max-width: 1240px; margin: 0 auto; padding: 0 34px; }
  header { padding: 34px 0 18px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo { flex: none; }
  h1 { font-family: var(--font-hand); font-size: 42px; margin: 0; font-weight: 700; line-height: 1; }
  .ver { align-self: flex-end; margin-bottom: 7px; font-size: 11px; color: var(--text-muted); }
  .sub { color: var(--text-secondary); font-size: 13.5px; margin: 8px 0 0; max-width: 60ch; }
  .search {
    border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--card);
    color: var(--text-primary); padding: 10px 13px; font-size: 13px; min-width: 250px; font-family: inherit;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search::placeholder { color: var(--text-muted); }
  .search:focus { outline: none; border-color: var(--text-muted); box-shadow: 0 0 0 3px rgba(255,255,255,0.06); }
  .controls { display: flex; align-items: center; gap: 8px; }
  .hbtn { font-family: inherit; font-size: 12px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--card); color: var(--text-secondary); padding: 9px 12px; cursor: pointer; white-space: nowrap; }
  .hbtn:hover { color: var(--text-primary); background: var(--card-hover); }

  /* distribution bar — live proportion of the store by bucket (incl. accepted
     folded into Adopted, and rejected). 2px surface gaps between segments. */
  .dist { margin: 0 0 22px; }
  .dist-bar { display: flex; gap: 2px; height: 8px; border-radius: var(--radius); overflow: hidden; background: var(--page); border: 1px solid var(--border); }
  .dist-bar span { display: block; min-width: 3px; }
  .dist-legend { display: flex; gap: 16px; margin-top: 9px; font-size: 11px; color: var(--text-secondary); flex-wrap: wrap; }
  .dist-legend .lg { display: inline-flex; align-items: center; gap: 6px; }
  .dist-legend .lg.zero { opacity: .4; }
  .dist-legend i { width: 9px; height: 9px; border-radius: 2px; }

  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 0 0 40px; align-items: start; }
  @media (max-width: 760px) { .board { grid-template-columns: 1fr; } }

  .col { --accent: var(--text-muted); background: color-mix(in srgb, var(--card) 55%, transparent); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 14px 8px; min-height: 260px; overflow: hidden; }
  .col[data-state="noticed"] { --accent: var(--noticed); }
  .col[data-state="recurring"]  { --accent: var(--recurring); }
  .col[data-state="adopted"]   { --accent: var(--adopted); }
  .col h2 {
    font-family: var(--font-hand); font-size: 24px; font-weight: 700; color: var(--text-primary);
    /* pull the header to the container edges so its bottom border spans the
       full width, not just the text column */
    margin: 0 -14px 14px; padding: 0 14px 11px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 9px;
  }
  .col h2::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .col h2 .n {
    font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--text-secondary);
    background: rgba(255,255,255,0.06); border-radius: var(--radius); padding: 2px 8px; margin-left: auto;
  }

  .card {
    --accent: var(--text-muted);
    position: relative; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px 17px 15px 19px; margin-bottom: 10px; cursor: pointer; overflow: hidden;
    transition: transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease, opacity .14s ease;
  }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .card.noticed { --accent: var(--noticed); }
  .card.recurring  { --accent: var(--recurring); }
  .card.adopted   { --accent: var(--adopted); }
  .card:hover, .card:focus-visible {
    outline: none; transform: translateY(-2px); background: var(--card-hover);
    border-color: color-mix(in srgb, var(--accent) 45%, var(--border-strong)); box-shadow: 0 8px 26px rgba(0,0,0,0.45);
  }
  .card.dec-accepted { border-color: color-mix(in srgb, var(--adopted) 55%, var(--border)); }
  .card.dec-rejected { opacity: .5; }
  .card.dec-rejected .name { text-decoration: line-through; }
  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise-in .34s cubic-bezier(.2,.7,.3,1) both; }
  }
  @keyframes rise-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .card .top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; padding-right: 58px; }
  .card .name { font-family: var(--font-hand); font-weight: 700; font-size: 22px; line-height: 1; }
  .card .why { font-size: 12.5px; color: var(--text-secondary); margin-top: 8px; line-height: 1.45; }
  .card .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .card .scope { font-size: 11px; color: var(--text-muted); }

  /* accept/reject appear on hover/focus, top-right; stopPropagation so they
     don't open the drawer. This is the "move" control — accept sends a card
     to Adopted, reject drops it to the collapsed Rejected tray. */
  .actions { position: absolute; top: 11px; right: 11px; display: flex; gap: 5px; opacity: 0; transition: opacity .12s ease; }
  .card:hover .actions, .card:focus-within .actions, .actions:focus-within { opacity: 1; }
  .act { width: 24px; height: 24px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); color: var(--text-secondary); font-size: 13px; line-height: 1; cursor: pointer; display: grid; place-items: center; }
  /* intent up front: accept reads green, reject reads rose, even before click */
  .act[data-act="accept"]:hover { border-color: var(--adopted); color: var(--adopted); }
  .act[data-act="reject"]:hover { border-color: var(--rejected); color: var(--rejected); }
  .act.on-accept { background: var(--adopted); border-color: var(--adopted); color: #06210f; }
  .act.on-reject { background: var(--rejected); border-color: var(--rejected); color: #1a0e12; }

  .chip {
    font-size: 10px; padding: 3px 8px; border-radius: var(--radius); border: 1px solid var(--border);
    color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; background: rgba(255,255,255,0.05); white-space: nowrap;
  }
  .chip.cluster {
    font-family: var(--font-hand); font-size: 15px; font-weight: 600; text-transform: none; letter-spacing: 0; padding: 0 9px;
    color: var(--accent, var(--text-secondary)); border-color: color-mix(in srgb, var(--accent, var(--border)) 35%, transparent);
    background: color-mix(in srgb, var(--accent, transparent) 12%, transparent);
  }
  .dots { display: flex; gap: 4px; align-items: center; }
  .dots .p { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); opacity: .3; }
  .dots .p.on { background: var(--accent); opacity: 1; box-shadow: 0 0 6px var(--accent); }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: var(--radius); background: var(--override); color: #14101f; text-transform: uppercase; letter-spacing: .04em; }

  .empty { color: var(--text-muted); font-size: 12px; font-style: italic; text-align: center; padding: 22px 12px; border: 1px dashed var(--border); border-radius: var(--radius); }
  .more {
    display: block; width: 100%; margin-top: 2px; padding: 9px; border: 1px dashed var(--border); border-radius: var(--radius);
    background: none; color: var(--text-secondary); font-size: 12px; font-family: inherit; cursor: pointer; transition: background .14s, border-color .14s;
  }
  .more:hover { background: rgba(255,255,255,0.04); border-color: var(--border-strong); }

  .profile {
    margin: 0 0 22px; padding: 18px 22px; border: 1px solid var(--border); border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent), color-mix(in srgb, var(--card) 55%, transparent);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .profile h3 { font-family: var(--font-hand); font-size: 22px; font-weight: 700; color: var(--text-primary); margin: 16px 0 3px; }
  .profile h3:first-child { margin-top: 0; }
  .profile p, .profile li { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin: 2px 0; }
  .profile ul { margin: 4px 0; padding-left: 18px; }

  /* rejected tray — collapsed by default so tombstoned patterns are out of
     the way but recoverable (reopen the card, clear the decision). */
  .rejected { margin: 0 34px 40px; }
  .rejected summary { cursor: pointer; color: var(--text-muted); font-size: 12px; padding: 6px 0; user-select: none; display: flex; align-items: center; gap: 7px; list-style: none; }
  .rejected summary::-webkit-details-marker { display: none; }
  .rejected summary::before { content: "›"; font-size: 15px; line-height: 1; transition: transform .15s ease; }
  .rejected[open] summary::before { transform: rotate(90deg); }
  .rejected .cards { margin-top: 8px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (max-width: 760px) { .rejected .cards { grid-template-columns: 1fr; } }

  /* pending-decisions tray — the bridge to the store. The viz can't write
     files, so it hands over the exact decide.py command to run. */
  .tray {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; padding: 12px 20px;
    background: color-mix(in srgb, var(--card) 92%, transparent); border-top: 1px solid var(--border-strong);
    backdrop-filter: blur(8px); display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .tray[hidden] { display: none; }
  .tray .lbl { font-size: 12px; color: var(--text-secondary); }
  .tray code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11.5px; color: var(--text-primary); background: rgba(255,255,255,0.06); padding: 6px 9px; border-radius: var(--radius); flex: 1; min-width: 200px; overflow-x: auto; white-space: nowrap; }
  .tray button { font-family: inherit; font-size: 12px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--card); color: var(--text-primary); padding: 7px 12px; cursor: pointer; }
  .tray button:hover { background: var(--card-hover); }
  #tray-copy { border-color: color-mix(in srgb, var(--adopted) 45%, var(--border-strong)); color: var(--adopted); }
  #tray-copy:hover { background: color-mix(in srgb, var(--adopted) 14%, transparent); }
  #tray-clear { color: var(--rejected); }
  #tray-clear:hover { background: color-mix(in srgb, var(--rejected) 14%, transparent); }

  /* bottom drawer (native <dialog> restyled as a bottom sheet — keeps Esc,
     backdrop, and focus-trap for free). Carries the pattern's state accent,
     set via data-state, so it reads as one system with the cards. */
  dialog#detail {
    --accent: var(--text-muted);
    margin: auto auto 0 auto; width: 100%; max-width: 100%; border: none;
    border-top: 2px solid var(--accent);
    border-radius: var(--radius) var(--radius) 0 0; background: var(--card); color: var(--text-primary);
    padding: 20px 28px 28px; box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
  }
  dialog#detail[data-state="noticed"]  { --accent: var(--noticed); }
  dialog#detail[data-state="recurring"] { --accent: var(--recurring); }
  dialog#detail[data-state="adopted"]  { --accent: var(--adopted); }
  dialog#detail[open] { animation: slide-up .22s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes slide-up { from { transform: translateY(100%); } to { transform: none; } }
  dialog#detail::backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); }
  .drawer-inner { max-width: 760px; margin: 0 auto; }
  .drawer-grip { width: 34px; height: 4px; border-radius: 2px; background: var(--accent); box-shadow: 0 0 10px var(--accent); margin: 0 auto 18px; }
  dialog#detail .dhead { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  dialog#detail .dtitle { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
  dialog#detail h2 { font-family: var(--font-hand); font-size: 28px; font-weight: 700; margin: 0; line-height: 1; }
  .state-pill { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding: 3px 9px; border-radius: var(--radius); background: var(--accent); color: #0b0b0e; }
  dialog#detail .close { border: none; background: none; color: var(--text-muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 4px; }
  dialog#detail .close:hover { color: var(--text-primary); }
  dialog#detail .row { margin-top: 16px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
  dialog#detail .body { font-size: 13.5px; color: var(--text-secondary); line-height: 1.55; margin-top: 5px; }
  dialog#detail .body p { margin: 6px 0; }
  dialog#detail .body h3 { font-family: var(--font-hand); font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 12px 0 2px; }
  dialog#detail .body ul { margin: 6px 0; padding-left: 18px; }
  dialog#detail .body strong { color: var(--text-primary); font-weight: 600; }
  dialog#detail .body code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px; }
  dialog#detail #d-target { white-space: pre-wrap; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
  dialog#detail .chips { margin-top: 18px; display: flex; gap: 7px; flex-wrap: wrap; }
  dialog#detail .drawer-actions { margin-top: 20px; display: flex; gap: 10px; }
  .btn { font-family: inherit; font-size: 13px; font-weight: 600; border-radius: var(--radius); padding: 9px 16px; cursor: pointer; border: 1px solid var(--border-strong); background: var(--card); color: var(--text-primary); }
  .btn:hover { background: var(--card-hover); }
  /* colored to intent even when unselected; solid fill once chosen */
  .btn.accept { border-color: color-mix(in srgb, var(--adopted) 45%, var(--border-strong)); color: var(--adopted); }
  .btn.accept:hover { background: color-mix(in srgb, var(--adopted) 14%, transparent); }
  .btn.accept.active { background: var(--adopted); border-color: var(--adopted); color: #06210f; }
  .btn.reject { border-color: color-mix(in srgb, var(--rejected) 45%, var(--border-strong)); color: var(--rejected); }
  .btn.reject:hover { background: color-mix(in srgb, var(--rejected) 14%, transparent); }
  .btn.reject.active { background: var(--rejected); border-color: var(--rejected); color: #1a0e12; }
</style>
</head>
<body>
<div class="shell">
<header>
  <div>
    <div class="brand">
      <!-- echo mark, source of truth: viz/logo.svg -->
      <svg class="logo" width="22" height="44" viewBox="30.50 10.50 38.99 79.00" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M50.84 22.43 L50.78 22.50 L50.50 22.85 L50.00 23.42 L49.28 24.16 L48.38 25.06 L47.31 26.08 L46.12 27.23 L44.81 28.49 L43.42 29.90 L41.96 31.45 L40.47 33.21 L38.97 35.19 L37.51 37.48 L36.16 40.11 L35.03 43.11 L34.27 46.45 L34.00 50.00 L34.27 53.55 L35.03 56.89 L36.16 59.89 L37.51 62.52 L38.97 64.81 L40.47 66.79 L41.96 68.55 L43.42 70.10 L44.81 71.51 L46.12 72.77 L47.31 73.92 L48.38 74.94 L49.28 75.84 L50.00 76.58 L50.50 77.15 L50.78 77.50 L50.84 77.57" stroke="#3a3a44"/>
        <path d="M52.46 19.78 L53.61 20.87 L54.66 21.90 L55.60 22.86 L56.40 23.74 L57.04 24.52 L57.51 25.17 L57.81 25.66 L57.96 25.97 L58.01 26.09 L57.88 26.22 L57.63 26.65 L57.22 27.25 L56.63 27.99 L55.88 28.83 L54.99 29.77 L53.97 30.78 L52.85 31.85 L51.67 32.99 L50.43 34.18 L49.18 35.45 L47.93 36.79 L46.70 38.23 L45.52 39.78 L44.43 41.49 L43.46 43.37 L42.69 45.43 L42.18 47.66 L42.00 50.00 L42.18 52.34 L42.69 54.57 L43.46 56.63 L44.43 58.51 L45.52 60.22 L46.70 61.77 L47.93 63.21 L49.18 64.55 L50.43 65.82 L51.67 67.01 L52.85 68.15 L53.97 69.22 L54.99 70.23 L55.88 71.17 L56.63 72.01 L57.22 72.75 L57.63 73.35 L57.88 73.78 L57.99 74.03 L58.01 74.10 L57.81 74.34 L57.51 74.83 L57.04 75.48 L56.40 76.26 L55.60 77.14 L54.66 78.10 L53.61 79.13 L52.46 80.22" stroke="#977942"/>
        <path d="M58.00 14.00 L59.17 15.13 L60.32 16.25 L61.42 17.38 L62.44 18.50 L63.37 19.63 L64.18 20.75 L64.86 21.88 L65.39 23.00 L65.76 24.13 L65.96 25.25 L65.99 26.38 L65.85 27.50 L65.53 28.63 L65.06 29.75 L64.43 30.88 L63.66 32.00 L62.77 33.13 L61.77 34.25 L60.70 35.38 L59.56 36.50 L58.39 37.63 L57.22 38.75 L56.06 39.88 L54.94 41.00 L53.89 42.13 L52.92 43.25 L52.07 44.38 L51.35 45.50 L50.77 46.63 L50.34 47.75 L50.09 48.88 L50.00 50.00 L50.09 51.13 L50.34 52.25 L50.77 53.38 L51.35 54.50 L52.07 55.63 L52.92 56.75 L53.89 57.88 L54.94 59.00 L56.06 60.13 L57.22 61.25 L58.39 62.38 L59.56 63.50 L60.70 64.63 L61.77 65.75 L62.77 66.88 L63.66 68.00 L64.43 69.13 L65.06 70.25 L65.53 71.38 L65.85 72.50 L65.99 73.63 L65.96 74.75 L65.76 75.88 L65.39 77.00 L64.86 78.13 L64.18 79.25 L63.37 80.38 L62.44 81.50 L61.42 82.63 L60.32 83.75 L59.17 84.88 L58.00 86.00" stroke="#f4b740"/>
      </svg>
      <h1>patternitty</h1>
      <span class="ver">v/*__PATTERNITTY_VERSION__*/</span>
    </div>
    <p class="sub">DRY for your preferences. Scream at your agent once. It does the nagging from then on.</p>
  </div>
  <div class="controls">
    <input class="search" id="search" type="search" placeholder="search patterns…" autocomplete="off">
    <button class="hbtn" id="recompile" hidden title="apply adopted patterns to this repo">↻ recompile</button>
  </div>
</header>
<div class="dist" id="dist"></div>
<div class="profile" id="profile" hidden></div>
<div class="board" id="board">
  <div class="col" data-state="noticed"><h2>Noticed <span class="n"></span></h2><div class="cards"></div></div>
  <div class="col" data-state="recurring"><h2>Recurring <span class="n"></span></h2><div class="cards"></div></div>
  <div class="col" data-state="adopted"><h2>Adopted <span class="n"></span></h2><div class="cards"></div></div>
</div>
<details class="rejected" id="rejected" hidden>
  <summary></summary>
  <div class="cards"></div>
</details>
</div>
<dialog id="detail"><div class="drawer-inner">
  <div class="drawer-grip"></div>
  <div class="dhead">
    <div class="dtitle">
      <span class="state-pill" id="d-state"></span>
      <h2 id="d-name"></h2>
      <span class="chip cluster" id="d-cluster" hidden></span>
    </div>
    <button class="close" id="d-close" aria-label="close">✕</button>
  </div>
  <div class="row">Why</div>
  <div class="body" id="d-body"></div>
  <div class="row" id="d-target-row" hidden>Overrides</div>
  <div class="body" id="d-target" hidden></div>
  <div class="chips" id="d-chips"></div>
  <div class="drawer-actions">
    <button class="btn accept" id="d-accept">✓ Accept</button>
    <button class="btn reject" id="d-reject">✕ Reject</button>
  </div>
</div></dialog>
<div class="tray" id="tray" hidden>
  <span class="lbl">Pending decisions — apply with:</span>
  <code id="tray-cmd"></code>
  <button id="tray-copy">Copy</button>
  <button id="tray-clear">Clear</button>
</div>
<script id="patternitty-data" type="application/json">/*__PATTERNITTY_DATA__*/</script>
<script id="patternitty-profile" type="application/json">/*__PATTERNITTY_PROFILE__*/</script>
<script>
  const DATA = JSON.parse(document.getElementById('patternitty-data').textContent || '[]');
  const PROFILE_MD = JSON.parse(document.getElementById('patternitty-profile').textContent || '""');
  const PAGE_SIZE = 6;
  const shown = { noticed: PAGE_SIZE, recurring: PAGE_SIZE, adopted: PAGE_SIZE };
  let query = '';
  // name -> target decision ('accepted' | 'rejected' | '') for this session,
  // overlaid on the stored decision until applied via decide.py.
  const pending = new Map();
  // served by `patternitty dashboard --serve`? then accept/reject persists
  // instantly via POST /decide; opened as a file:// it falls back to pending
  // + the copy-a-command tray.
  const SERVED = location.protocol === 'http:' || location.protocol === 'https:';

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function matches(p, q) {
    if (!q) return true;
    const at = p.applies_to || {};
    return [p.name, p.body, p.type, p.cluster, at.tool, at.project].filter(Boolean).join(' ').toLowerCase().includes(q);
  }
  const STATE_LABEL = { noticed: 'Noticed', recurring: 'Recurring', adopted: 'Adopted' };
  const storedDecision = p => (p.decision === 'accepted' || p.decision === 'rejected') ? p.decision : '';
  const effDecision = p => pending.has(p.name) ? pending.get(p.name) : storedDecision(p);
  // where a card shows: accept -> Adopted, reject -> hidden (rejected tray),
  // else its occurrence-driven state column.
  function bucket(p) {
    const d = effDecision(p);
    if (d === 'rejected') return 'rejected';
    if (d === 'accepted') return 'adopted';
    return p.state;
  }

  function card(p, index, delayStep) {
    const occ = Math.min(parseInt(p.occurrences, 10) || 0, 3);
    const dots = [1, 2, 3].map(i => `<span class="p${i <= occ ? ' on' : ''}"></span>`).join('');
    const at = p.applies_to || {};
    const scope = [at.tool, at.project].filter(x => x && x !== '*').join(' · ') || 'everywhere';
    const badge = p.type === 'override' ? '<span class="badge">override</span>' : '';
    const why = (p.body || '').split('\n').find(l => l.trim()) || '';
    const tag = p.cluster ? `<span class="chip cluster">${escapeHtml(p.cluster)}</span>` : '';
    const tierTag = p.tier === 'repo' ? '<span class="chip" title="team / committed repo store">repo</span>' : '';
    const d = effDecision(p);
    const decCls = d ? ` dec-${d}` : '';
    return `<div class="card ${p.state}${decCls}" data-index="${index}" tabindex="0" style="animation-delay:${delayStep * 35}ms">
      <div class="actions">
        <button class="act${d === 'accepted' ? ' on-accept' : ''}" data-act="accept" data-index="${index}" title="accept (pin to Adopted)" aria-label="accept">✓</button>
        <button class="act${d === 'rejected' ? ' on-reject' : ''}" data-act="reject" data-index="${index}" title="reject (tombstone)" aria-label="reject">✕</button>
      </div>
      <div class="top"><span class="name">${escapeHtml(p.name)}</span>${tag}${tierTag}</div>
      <div class="why">${escapeHtml(why)}</div>
      <div class="foot"><span class="scope">${escapeHtml(scope)}</span>${badge || `<span class="dots">${dots}</span>`}</div>
    </div>`;
  }

  async function setDecision(index, verb) {
    const p = DATA[index];
    const target = effDecision(p) === verb ? '' : verb;  // click active verb again = undo
    if (SERVED) {
      try {
        const res = await fetch('/decide', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: p.name, decision: target }),
        });
        const fresh = await res.json();
        DATA.length = 0; DATA.push(...fresh);  // persisted; reflect the store
      } catch (e) {
        pending.set(p.name, target);  // server hiccup → fall back to pending
      }
      render();
      return;
    }
    pending.set(p.name, target);
    render();
  }

  function render() {
    const q = query.trim().toLowerCase();
    const visibleData = DATA.filter(p => matches(p, q));
    document.querySelectorAll('.col').forEach(col => {
      const state = col.dataset.state;
      const items = visibleData.filter(p => bucket(p) === state);
      col.querySelector('h2 .n').textContent = items.length;
      const vis = items.slice(0, shown[state]);
      const cardsHtml = vis.length ? vis.map((p, i) => card(p, DATA.indexOf(p), i)).join('') : '<div class="empty">nothing here yet</div>';
      const moreHtml = items.length > vis.length
        ? `<button class="more" data-state="${state}">show ${Math.min(PAGE_SIZE, items.length - vis.length)} more (${items.length - vis.length} left)</button>` : '';
      col.querySelector('.cards').innerHTML = cardsHtml + moreHtml;
    });

    const rejected = visibleData.filter(p => bucket(p) === 'rejected');
    const rejEl = document.getElementById('rejected');
    rejEl.hidden = rejected.length === 0;
    if (rejected.length) {
      rejEl.querySelector('summary').textContent = `Rejected (${rejected.length})`;
      rejEl.querySelector('.cards').innerHTML = rejected.map((p, i) => card(p, DATA.indexOf(p), i)).join('');
    }

    document.querySelectorAll('.more').forEach(b => b.addEventListener('click', () => { shown[b.dataset.state] += PAGE_SIZE; render(); }));
    document.querySelectorAll('.act').forEach(b => b.addEventListener('click', e => {
      e.stopPropagation();
      setDecision(parseInt(b.dataset.index, 10), b.dataset.act === 'accept' ? 'accepted' : 'rejected');
    }));
    document.querySelectorAll('.card').forEach(el => {
      const open = () => openDetail(parseInt(el.dataset.index, 10));
      el.addEventListener('click', open);
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
    });
    renderDist();
    renderTray();
  }

  // whole-store proportion by bucket (honors pending decisions, so it shifts
  // live as you accept/reject); not search-filtered — it's a store overview.
  const DIST = [
    ['noticed', 'Noticed', 'var(--noticed)'], ['recurring', 'Recurring', 'var(--recurring)'],
    ['adopted', 'Adopted', 'var(--adopted)'], ['rejected', 'Rejected', 'var(--rejected)'],
  ];
  function renderDist() {
    const counts = Object.fromEntries(DIST.map(([k]) => [k, 0]));
    DATA.forEach(p => { counts[bucket(p)]++; });
    const total = DATA.length || 1;
    const bar = DIST.filter(([k]) => counts[k]).map(([k, label, c]) =>
      `<span style="flex:${counts[k]};background:${c}" title="${label}: ${counts[k]} (${Math.round(counts[k] / total * 100)}%)"></span>`).join('')
      || '<span style="flex:1;background:var(--border)"></span>';
    const legend = DIST.map(([k, label, c]) =>
      `<span class="lg${counts[k] ? '' : ' zero'}"><i style="background:${c}"></i>${label} ${counts[k]}</span>`).join('');
    document.getElementById('dist').innerHTML = `<div class="dist-bar">${bar}</div><div class="dist-legend">${legend}</div>`;
  }

  function renderTray() {
    const verb = { accepted: 'accept', rejected: 'reject', '': 'clear' };
    const tokens = [];
    for (const [name, target] of pending) {
      const p = DATA.find(x => x.name === name);
      if (!p || target === storedDecision(p)) continue;  // no-op vs the store
      tokens.push(`${verb[target]}:${name}`);
    }
    const tray = document.getElementById('tray');
    tray.hidden = SERVED || tokens.length === 0;  // served mode persists directly — no tray
    if (!SERVED && tokens.length) document.getElementById('tray-cmd').textContent =
      `uv run <patternitty-repo>/scripts/decide.py ${tokens.join(' ')}`;
  }

  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value;
    Object.keys(shown).forEach(k => shown[k] = PAGE_SIZE);
    render();
  });
  document.getElementById('tray-copy').addEventListener('click', () => {
    navigator.clipboard?.writeText(document.getElementById('tray-cmd').textContent);
  });
  document.getElementById('tray-clear').addEventListener('click', () => { pending.clear(); render(); });

  // served mode: expose a "recompile" button that applies adopted patterns to
  // the repo the server was started in (POST /compile).
  const recompileBtn = document.getElementById('recompile');
  if (SERVED) {
    recompileBtn.hidden = false;
    recompileBtn.addEventListener('click', async () => {
      recompileBtn.textContent = '↻ compiling…';
      try { await fetch('/compile', { method: 'POST' }); recompileBtn.textContent = '✓ recompiled'; }
      catch (e) { recompileBtn.textContent = '⚠ failed'; }
      setTimeout(() => { recompileBtn.textContent = '↻ recompile'; }, 1600);
    });
  }

  // tiny markdown renderer — just the subset patternitty emits (headings,
  // bullets, **bold**, `code`), escaped-first so it can't inject HTML. Not a
  // general parser; enough for pattern bodies and PROFILE.md.
  function mdInline(s) {
    return escapeHtml(s)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }
  function renderMarkdown(md) {
    let html = '', inList = false;
    const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };
    for (const raw of (md || '').split('\n')) {
      const line = raw.trim();
      if (!line) { closeList(); continue; }
      if (line.startsWith('## ')) { closeList(); html += `<h3>${mdInline(line.slice(3))}</h3>`; }
      else if (line.startsWith('# ')) { closeList(); html += `<h3>${mdInline(line.slice(2))}</h3>`; }
      else if (line.startsWith('- ')) { if (!inList) { html += '<ul>'; inList = true; } html += `<li>${mdInline(line.slice(2))}</li>`; }
      else { closeList(); html += `<p>${mdInline(line)}</p>`; }
    }
    closeList();
    return html;
  }
  function renderProfile(md) {
    const panel = document.getElementById('profile');
    panel.innerHTML = renderMarkdown(md);
    panel.hidden = !(md || '').trim();
  }

  const detail = document.getElementById('detail');
  let openIndex = -1;
  function openDetail(index) {
    openIndex = index;
    const p = DATA[index];
    // header: state accent + pill (uses the effective bucket so it matches
    // where the card lives), name, then cluster chip
    detail.dataset.state = bucket(p) === 'rejected' ? '' : bucket(p);
    document.getElementById('d-state').textContent = STATE_LABEL[bucket(p)] || bucket(p);
    document.getElementById('d-name').textContent = p.name;
    const clusterEl = document.getElementById('d-cluster');
    clusterEl.hidden = !p.cluster;
    clusterEl.textContent = p.cluster || '';
    document.getElementById('d-body').innerHTML = renderMarkdown(p.body || '');
    const at = p.applies_to || {};
    const scope = [at.tool, at.project, at.glob].filter(x => x && x !== '*').join(' · ') || 'everywhere';
    const hasTarget = p.type === 'override' && p.target && p.target !== 'null';
    document.getElementById('d-target-row').hidden = !hasTarget;
    const targetEl = document.getElementById('d-target');
    targetEl.hidden = !hasTarget;
    targetEl.textContent = hasTarget ? p.target : '';
    // secondary meta only (state + cluster now live in the header row)
    const via = [p.agent, p.author].filter(x => x && x !== 'unknown' && x !== 'anon').join(' · ');
    const occ = p.occurrences || 0;
    document.getElementById('d-chips').innerHTML = [
      `${occ} occurrence${occ == 1 ? '' : 's'}`, scope,
      p.tier === 'repo' ? 'team · repo store' : '', via ? `via ${via}` : '',
    ].filter(Boolean).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('');
    const d = effDecision(p);
    document.getElementById('d-accept').classList.toggle('active', d === 'accepted');
    document.getElementById('d-reject').classList.toggle('active', d === 'rejected');
    detail.showModal();
  }
  document.getElementById('d-close').addEventListener('click', () => detail.close());
  detail.addEventListener('click', e => { if (e.target === detail) detail.close(); });
  document.getElementById('d-accept').addEventListener('click', () => { setDecision(openIndex, 'accepted'); detail.close(); });
  document.getElementById('d-reject').addEventListener('click', () => { setDecision(openIndex, 'rejected'); detail.close(); });

  renderProfile(PROFILE_MD);
  render();
</script>
</body>
</html>
